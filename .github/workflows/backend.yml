name: Backend Docker CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t esiny-backend .