server {
    # Snapphound / many proxies target 80 or 8080; old Dockerfile used 5173 (dev) — wrong for production
    listen 80;
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
